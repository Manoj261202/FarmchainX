<style>
  .header-glow {
    box-shadow: 0 0 20px rgba(99, 102, 241, 0.1);
  }
</style>

<div class="flex h-screen overflow-hidden bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900">
  <app-admin-sidebar class="hidden lg:flex"></app-admin-sidebar>

  <div class="flex-1 flex flex-col overflow-y-auto">
    <!-- Header -->
    <header class="sticky top-0 z-40 bg-slate-800/80 backdrop-blur-xl border-b border-slate-700/50 shadow-lg header-glow">
      <div class="max-w-full mx-auto px-4 sm:px-6 lg:px-8 py-4">
        <div class="flex items-center justify-between">
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-4">
              <button (click)="toggleSidebar()"
                class="p-2 rounded-lg text-slate-300 hover:text-white hover:bg-slate-700/50 transition lg:hidden">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
              </button>

              <div>
                <h1 class="text-2xl md:text-3xl font-extrabold text-white tracking-tight">
                  Admin Panel
                </h1>
                <p class="text-sm text-slate-400 mt-1">
                  Welcome back,
                  <span class="font-semibold text-purple-400">
                    {{ currentAdminName() }}
                  </span>
                </p>
              </div>
            </div>
          </div>

          <div class="flex items-center gap-4">
            <div
              class="hidden sm:flex items-center gap-2 bg-gradient-to-r from-emerald-600/20 to-teal-600/20 px-4 py-2 rounded-full border border-emerald-500/30 backdrop-blur-sm">
              <div class="relative">
                <div class="w-2.5 h-2.5 bg-emerald-400 rounded-full"></div>
                <div class="w-2.5 h-2.5 bg-emerald-400 rounded-full absolute inset-0 animate-pulse opacity-75"></div>
              </div>
              <span class="text-sm font-medium text-emerald-300">Operational</span>
            </div>

            <button class="relative p-2 rounded-lg text-slate-300 hover:text-white hover:bg-slate-700/50 transition">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
              </svg>
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 bg-gradient-to-br from-slate-900 to-slate-800">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <router-outlet></router-outlet>
      </div>
    </main>

    <!-- Footer -->
    <footer
      class="sticky bottom-0 z-30 bg-slate-800/80 backdrop-blur-xl border-t border-slate-700/50 px-4 sm:px-6 lg:px-8 py-4">
      <div class="flex flex-col sm:flex-row items-center justify-between gap-4">
        <p class="text-sm text-slate-400">
          © 2025 <span class="font-semibold text-purple-400">FarmChainX</span> Admin Portal
        </p>
        <div class="flex items-center gap-4 text-sm text-slate-400">
          <a href="#" class="hover:text-purple-400 transition">Documentation</a>
          <span class="text-slate-600">•</span>
          <a href="#" class="hover:text-purple-400 transition">Support</a>
          <span class="text-slate-600">•</span>
          <a href="#" class="hover:text-purple-400 transition">Privacy</a>
        </div>
      </div>
    </footer>
  </div>

  <!-- Mobile Sidebar Overlay -->
  <div *ngIf="sidebarOpen" class="fixed inset-0 z-50 lg:hidden" (click)="toggleSidebar()">
    <div class="absolute inset-0 bg-black/70 backdrop-blur-sm transition-opacity duration-300 ease-in-out"></div>

    <div
      class="absolute left-0 top-0 h-full w-64 bg-slate-900 shadow-2xl transform transition-transform duration-300 ease-in-out"
      [ngClass]="{ 'translate-x-0': sidebarOpen, '-translate-x-full': !sidebarOpen }"
      (click)="$event.stopPropagation()">
      <app-admin-sidebar></app-admin-sidebar>
    </div>
  </div>
</div>
