<style>
  @keyframes slideInLeft {
    from {
      opacity: 0;
      transform: translateX(-30px);
    }
    to {
      opacity: 1;
      transform: translateX(0);
    }
  }

  @keyframes slideInRight {
    from {
      opacity: 0;
      transform: translateX(30px);
    }
    to {
      opacity: 1;
      transform: translateX(0);
    }
  }

  .slide-in-left {
    animation: slideInLeft 0.7s ease-out;
  }

  .slide-in-right {
    animation: slideInRight 0.7s ease-out;
  }

  .table-row-hover {
    transition: all 0.3s ease;
  }

  .table-row-hover:hover {
    background: linear-gradient(90deg, rgba(99, 102, 241, 0.1), transparent);
    transform: translateX(4px);
  }
</style>

<div class="min-h-screen bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 relative overflow-hidden">
  <!-- Decorative Background Elements -->
  <div class="absolute top-0 left-10 w-96 h-96 bg-purple-500/10 rounded-full mix-blend-multiply filter blur-3xl"></div>
  <div class="absolute -bottom-32 right-10 w-80 h-80 bg-indigo-500/10 rounded-full mix-blend-multiply filter blur-3xl"></div>
  <div class="absolute top-1/2 left-1/2 w-72 h-72 bg-pink-500/5 rounded-full mix-blend-multiply filter blur-3xl"></div>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 sm:py-12 relative z-10">
    <!-- Header Section -->
    <div class="slide-in-left mb-8">
      <div class="flex items-center gap-4 mb-6">
        <div class="w-14 h-14 bg-gradient-to-br from-purple-600 to-indigo-600 rounded-2xl flex items-center justify-center">
          <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 12H9m6 0a6 6 0 11-12 0 6 6 0 0112 0z" />
          </svg>
        </div>
        <div>
          <h1 class="text-4xl sm:text-5xl font-black text-white">User Management</h1>
          <p class="text-purple-200 text-lg mt-1">Manage platform roles and permissions for all active accounts</p>
        </div>
      </div>
    </div>

    <!-- Search Bar -->
    <div class="slide-in-right mb-8">
      <div class="relative max-w-xl">
        <span class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
          <svg class="h-5 w-5 text-purple-400" viewBox="0 0 20 20" fill="currentColor">
            <path fill-rule="evenodd"
              d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z"
              clip-rule="evenodd" />
          </svg>
        </span>
        <input type="text" [(ngModel)]="searchTerm" (ngModelChange)="onSearch()"
          class="block w-full pl-12 pr-4 py-4 border-2 border-purple-500/30 rounded-xl leading-5 bg-white/10 backdrop-blur-xl text-white placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent sm:text-sm transition shadow-lg hover:border-purple-500/50"
          placeholder="Search users by name, email or role...">
      </div>
    </div>

    <!-- Table Container -->
    <div class="slide-in-left bg-gradient-to-br from-slate-800/50 to-slate-700/50 backdrop-blur-xl border border-slate-700/50 rounded-2xl overflow-hidden">
      <div *ngIf="isLoading" class="p-12 text-center">
        <div class="animate-spin rounded-full h-14 w-14 border-4 border-purple-500/30 border-t-purple-500 mx-auto"></div>
        <p class="mt-6 font-semibold text-purple-200 text-lg">Loading users...</p>
      </div>

      <div *ngIf="!isLoading && users.length > 0" class="overflow-x-auto">
        <table class="w-full min-w-[700px]">
          <thead class="bg-gradient-to-r from-purple-600/20 to-indigo-600/20 border-b border-slate-700/50">
            <tr>
              <th class="px-6 sm:px-10 py-5 text-left text-xs font-bold uppercase tracking-wider text-purple-300">
                Name
              </th>
              <th class="px-6 sm:px-10 py-5 text-left text-xs font-bold uppercase tracking-wider text-purple-300">
                Email
              </th>
              <th class="px-6 sm:px-10 py-5 text-left text-xs font-bold uppercase tracking-wider text-purple-300">
                Role
              </th>
            </tr>
          </thead>

          <tbody class="divide-y divide-slate-700/50">
            <tr *ngFor="let user of filteredUsers" class="table-row-hover">
              <td class="px-6 sm:px-10 py-5 font-bold text-white whitespace-nowrap">
                {{ user.name }}
              </td>

              <td class="px-6 sm:px-10 py-5 text-purple-200 whitespace-nowrap text-sm">
                {{ user.email }}
              </td>

              <td class="px-6 sm:px-10 py-5 whitespace-nowrap">
                <span class="px-3 py-1.5 rounded-full text-xs font-extrabold uppercase tracking-wider backdrop-blur-sm border"
                  [ngClass]="roleClass(user.primaryRole)">
                  {{ user.primaryRole }}
                </span>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <div *ngIf="users.length === 0 && !isLoading" class="px-6 sm:px-10 py-16 text-center">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-purple-500/20 rounded-2xl mb-4">
          <svg class="w-8 h-8 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        </div>
        <p class="text-white text-lg font-semibold">No users found</p>
        <p class="text-purple-300 text-sm mt-2">Try adjusting your search criteria</p>
      </div>
    </div>

    <!-- Footer -->
    <div class="mt-12 pt-8 border-t border-slate-700/40 text-center slide-in-right">
      <p class="text-slate-400">© 2025 FarmChainX • User Management System</p>
    </div>
  </div>
</div>
